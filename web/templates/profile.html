{{ define "content" }}
<h1>{{ .Name }}</h1>
<article>
  <p>{{ .Description }}</p>
</article>
{{ if .IsOwner }}
<form action="/profile/description" method="POST">
  <label>Edit description
    <textarea name="description" rows="4">{{ .Description }}</textarea>
  </label>
  <button type="submit">Save</button>
</form>
{{ end }}
{{ end }}
