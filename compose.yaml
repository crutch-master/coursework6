services:
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs
    networks:
      - seaweedfs
    command: 'mini -ip=0.0.0.0 -ip.bind=0.0.0.0 -s3 -s3.config=/etc/seaweedfs/s3.json'
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro

  migrator:
    build:
      context: .
      dockerfile: migrator/Dockerfile
    networks:
      - postgres
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./web
    environment:
      - DBSTRING=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - 9090:9090
    networks:
      - seaweedfs
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  worker:
    build: ./worker
    environment:
      - DBSTRING=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
    networks:
      - seaweedfs
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

volumes:
  seaweedfs_data:

networks:
  postgres:
    driver: bridge
  seaweedfs:
    driver: bridge
